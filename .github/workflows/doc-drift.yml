name: Doc Drift Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  doc-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Check documentation drift
        run: npx agent-guard check
